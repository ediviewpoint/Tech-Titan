name: CI — Tech-Titan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    name: Backend (TypeCheck + Tests)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: capa-negocio

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: capa-negocio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --coverage

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeCheck + Build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: capa-presentacion

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: capa-presentacion/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build (smoke test)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:9000
          AUTH_SECRET: ci-secret-placeholder-min-32-chars-ok
