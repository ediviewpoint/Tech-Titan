<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background -->
  <rect width="80" height="80" fill="#0d1117" rx="8"/>
  <!-- 3.5" HDD body -->
  <rect x="8" y="14" width="64" height="52" rx="3" fill="#0f1015" stroke="#64748b" stroke-width="1.5"/>
  <!-- Top face with disk visible -->
  <rect x="12" y="18" width="56" height="38" rx="2" fill="#0a0c10" stroke="#64748b" stroke-width="0.8" opacity="0.7"/>
  <!-- Spinning disk circles -->
  <circle cx="34" cy="37" r="16" fill="none" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>
  <circle cx="34" cy="37" r="12" fill="none" stroke="#64748b" stroke-width="0.6" opacity="0.4"/>
  <circle cx="34" cy="37" r="8" fill="none" stroke="#64748b" stroke-width="0.6" opacity="0.4"/>
  <circle cx="34" cy="37" r="4" fill="none" stroke="#64748b" stroke-width="0.6" opacity="0.5"/>
  <!-- Spindle center -->
  <circle cx="34" cy="37" r="2" fill="#64748b" opacity="0.5"/>
  <!-- Read/Write arm -->
  <line x1="34" y1="37" x2="50" y2="24" stroke="#64748b" stroke-width="1.2" opacity="0.7"/>
  <circle cx="50" cy="24" r="2" fill="none" stroke="#64748b" stroke-width="1" opacity="0.6"/>
  <!-- PCB area on right -->
  <rect x="54" y="20" width="12" height="34" rx="1" fill="#0d1015" stroke="#64748b" stroke-width="0.6" opacity="0.5"/>
  <line x1="57" y1="24" x2="63" y2="24" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
  <line x1="57" y1="28" x2="63" y2="28" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
  <line x1="57" y1="32" x2="63" y2="32" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
  <!-- SATA connectors at bottom -->
  <rect x="12" y="56" width="18" height="5" rx="1" fill="none" stroke="#64748b" stroke-width="0.8"/>
  <rect x="33" y="56" width="12" height="5" rx="1" fill="none" stroke="#64748b" stroke-width="0.8"/>
  <!-- Label -->
  <text x="34" y="70" font-family="monospace" font-size="4" fill="#64748b" text-anchor="middle" opacity="0.6">HDD 3.5"</text>
</svg>
