<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background -->
  <rect width="80" height="80" fill="#0d1117" rx="8"/>
  <!-- 2.5" SSD body -->
  <rect x="10" y="18" width="60" height="44" rx="3" fill="#0f1520" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Top label area -->
  <rect x="14" y="22" width="52" height="22" rx="2" fill="#0a1018" stroke="#94a3b8" stroke-width="0.8" opacity="0.6"/>
  <!-- SSD label text -->
  <text x="40" y="31" font-family="monospace" font-size="5" font-weight="bold" fill="#94a3b8" text-anchor="middle">SATA SSD</text>
  <text x="40" y="39" font-family="monospace" font-size="4" fill="#94a3b8" text-anchor="middle" opacity="0.6">2.5"</text>
  <!-- SATA power connector -->
  <rect x="14" y="50" width="20" height="6" rx="1" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <line x1="17" y1="51" x2="17" y2="55" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <line x1="20" y1="51" x2="20" y2="55" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <line x1="23" y1="51" x2="23" y2="55" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <line x1="26" y1="51" x2="26" y2="55" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <line x1="29" y1="51" x2="29" y2="55" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <!-- SATA data connector -->
  <rect x="38" y="50" width="14" height="6" rx="1" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <line x1="41" y1="51" x2="41" y2="55" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <line x1="44" y1="51" x2="44" y2="55" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <line x1="47" y1="51" x2="47" y2="55" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
  <!-- Corner mounting holes -->
  <circle cx="14" cy="24" r="2" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.5"/>
  <circle cx="66" cy="24" r="2" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.5"/>
  <circle cx="14" cy="56" r="2" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.5"/>
  <circle cx="66" cy="56" r="2" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.5"/>
</svg>
