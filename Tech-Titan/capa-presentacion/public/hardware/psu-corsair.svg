  <rect x="49" y="32" width="5" height="3" rx="0.5" fill="none" stroke="#06b6d4" stroke-width="0.8"/>
  <rect x="56" y="32" width="5" height="3" rx="0.5" fill="none" stroke="#06b6d4" stroke-width="0.8"/>
  <rect x="49" y="38" width="12" height="3" rx="0.5" fill="none" stroke="#06b6d4" stroke-width="0.8"/>
  <rect x="49" y="44" width="12" height="3" rx="0.5" fill="none" stroke="#06b6d4" stroke-width="0.8"/>
