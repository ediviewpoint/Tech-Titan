<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background -->
  <rect width="80" height="80" fill="#0d1117" rx="8"/>
  <!-- Radiator body -->
  <rect x="10" y="8" width="60" height="28" rx="2" fill="#0a1a1a" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- Radiator fins (horizontal) -->
  <line x1="11" y1="13" x2="69" y2="13" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="11" y1="17" x2="69" y2="17" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="11" y1="21" x2="69" y2="21" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="11" y1="25" x2="69" y2="25" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="11" y1="29" x2="69" y2="29" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="11" y1="33" x2="69" y2="33" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <!-- Fan grid overlay on radiator -->
  <rect x="12" y="10" width="24" height="24" rx="1" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <circle cx="24" cy="22" r="8" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.6"/>
  <circle cx="24" cy="22" r="3" fill="#06b6d4" opacity="0.3"/>
  <rect x="44" y="10" width="24" height="24" rx="1" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <circle cx="56" cy="22" r="8" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.6"/>
  <circle cx="56" cy="22" r="3" fill="#06b6d4" opacity="0.3"/>
  <!-- Tubing from radiator -->
  <path d="M 20 36 Q 20 48 14 52" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <path d="M 26 36 Q 26 50 60 50 Q 66 50 66 58" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <!-- CPU pump/block at bottom -->
  <rect x="26" y="58" width="28" height="16" rx="3" fill="#0a1a1a" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- Pump logo -->
  <circle cx="40" cy="66" r="5" fill="none" stroke="#06b6d4" stroke-width="0.8"/>
  <circle cx="40" cy="66" r="2" fill="#06b6d4" opacity="0.4"/>
  <!-- RGB ring on pump -->
  <circle cx="40" cy="66" r="7" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.4" stroke-dasharray="2 2"/>
</svg>
