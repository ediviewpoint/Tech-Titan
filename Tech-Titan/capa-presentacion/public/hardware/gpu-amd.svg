<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background -->
  <rect width="80" height="80" fill="#0d1117" rx="8"/>
  <!-- PCB board -->
  <rect x="8" y="28" width="64" height="30" rx="2" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <!-- PCIe connector at bottom -->
  <rect x="14" y="55" width="52" height="5" rx="1" fill="#2a1010" stroke="#ef4444" stroke-width="1"/>
  <!-- Gold PCIe pins -->
  <line x1="17" y1="56" x2="17" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="20" y1="56" x2="20" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="23" y1="56" x2="23" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="26" y1="56" x2="26" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="29" y1="56" x2="29" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="32" y1="56" x2="32" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="35" y1="56" x2="35" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="38" y1="56" x2="38" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="41" y1="56" x2="41" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="44" y1="56" x2="44" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="47" y1="56" x2="47" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="50" y1="56" x2="50" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="53" y1="56" x2="53" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="56" y1="56" x2="56" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="59" y1="56" x2="59" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <line x1="62" y1="56" x2="62" y2="59" stroke="#f59e0b" stroke-width="1.2"/>
  <!-- Heatsink fins (top of card) -->
  <rect x="10" y="10" width="60" height="20" rx="2" fill="#1a0a0a" stroke="#ef4444" stroke-width="1"/>
  <line x1="15" y1="11" x2="15" y2="29" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="11" x2="20" y2="29" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="25" y1="11" x2="25" y2="29" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="30" y1="11" x2="30" y2="29" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="35" y1="11" x2="35" y2="29" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="40" y1="11" x2="40" y2="29" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="45" y1="11" x2="45" y2="29" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="50" y1="11" x2="50" y2="29" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="55" y1="11" x2="55" y2="29" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="60" y1="11" x2="60" y2="29" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
  <line x1="65" y1="11" x2="65" y2="29" stroke="#ef4444" stroke-width="0.8" opacity="0.6"/>
  <!-- GPU chip on PCB -->
  <rect x="28" y="33" width="18" height="14" rx="1" fill="#2a1010" stroke="#ef4444" stroke-width="1"/>
  <!-- RX label -->
  <text x="37" y="43" font-family="monospace" font-size="6.5" font-weight="bold" fill="#ef4444" text-anchor="middle">RX</text>
  <!-- Power connector -->
  <rect x="58" y="30" width="8" height="12" rx="1" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
  <line x1="60" y1="32" x2="60" y2="40" stroke="#ef4444" stroke-width="0.8" opacity="0.5"/>
  <line x1="63" y1="32" x2="63" y2="40" stroke="#ef4444" stroke-width="0.8" opacity="0.5"/>
</svg>
