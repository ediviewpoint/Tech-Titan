<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background -->
  <rect width="80" height="80" fill="#0d1117" rx="8"/>
  <!-- Chip body -->
  <rect x="20" y="20" width="40" height="40" rx="3" fill="#0a0f1a" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Inner die -->
  <rect x="27" y="27" width="26" height="26" rx="2" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
  <!-- INTEL text -->
  <text x="40" y="43" font-family="monospace" font-size="6" font-weight="bold" fill="#3b82f6" text-anchor="middle">INTEL</text>
  <!-- Circuit pins - top -->
  <line x1="28" y1="20" x2="28" y2="14" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="34" y1="20" x2="34" y2="14" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="40" y1="20" x2="40" y2="14" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="46" y1="20" x2="46" y2="14" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="52" y1="20" x2="52" y2="14" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <!-- Circuit pins - bottom -->
  <line x1="28" y1="60" x2="28" y2="66" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="34" y1="60" x2="34" y2="66" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="40" y1="60" x2="40" y2="66" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="46" y1="60" x2="46" y2="66" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="52" y1="60" x2="52" y2="66" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <!-- Circuit pins - left -->
  <line x1="20" y1="28" x2="14" y2="28" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="20" y1="34" x2="14" y2="34" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="20" y1="40" x2="14" y2="40" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="20" y1="46" x2="14" y2="46" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="20" y1="52" x2="14" y2="52" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <!-- Circuit pins - right -->
  <line x1="60" y1="28" x2="66" y2="28" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="60" y1="34" x2="66" y2="34" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="60" y1="40" x2="66" y2="40" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="60" y1="46" x2="66" y2="46" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <line x1="60" y1="52" x2="66" y2="52" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <!-- Intel-style corner notch indicator -->
  <circle cx="22" cy="22" r="2" fill="#3b82f6" opacity="0.8"/>
  <!-- Glow dots -->
  <circle cx="29" cy="29" r="1" fill="#3b82f6" opacity="0.4"/>
  <circle cx="51" cy="29" r="1" fill="#3b82f6" opacity="0.4"/>
  <circle cx="29" cy="51" r="1" fill="#3b82f6" opacity="0.4"/>
  <circle cx="51" cy="51" r="1" fill="#3b82f6" opacity="0.4"/>
</svg>
