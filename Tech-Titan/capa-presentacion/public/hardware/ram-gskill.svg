<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background -->
  <rect width="80" height="80" fill="#0d1117" rx="8"/>
  <!-- RAM stick body -->
  <rect x="22" y="16" width="36" height="44" rx="2" fill="#1a0a14" stroke="#ec4899" stroke-width="1.5"/>
  <!-- G.SKILL Trident Z spiky top fins -->
  <polygon points="26,16 29,8 32,16" fill="#1a0a14" stroke="#ec4899" stroke-width="1"/>
  <polygon points="34,16 37,8 40,16" fill="#1a0a14" stroke="#ec4899" stroke-width="1"/>
  <polygon points="42,16 45,8 48,16" fill="#1a0a14" stroke="#ec4899" stroke-width="1"/>
  <!-- PCB notch at bottom -->
  <rect x="22" y="55" width="13" height="5" rx="0" fill="#0d1117"/>
  <rect x="45" y="55" width="13" height="5" rx="0" fill="#0d1117"/>
  <!-- Gold pins at bottom -->
  <line x1="25" y1="58" x2="25" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="28" y1="58" x2="28" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="31" y1="58" x2="31" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="34" y1="58" x2="34" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="46" y1="58" x2="46" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="49" y1="58" x2="49" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="52" y1="58" x2="52" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="55" y1="58" x2="55" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- RGB accent stripe -->
  <rect x="22" y="20" width="36" height="3" fill="#ec4899" opacity="0.3"/>
  <line x1="22" y1="21" x2="58" y2="21" stroke="#ec4899" stroke-width="1.5" opacity="0.9"/>
  <!-- RAM chips -->
  <rect x="25" y="26" width="30" height="8" rx="1" fill="none" stroke="#ec4899" stroke-width="0.8" opacity="0.6"/>
  <rect x="25" y="37" width="30" height="8" rx="1" fill="none" stroke="#ec4899" stroke-width="0.8" opacity="0.6"/>
  <!-- G.SKILL label -->
  <text x="40" y="51" font-family="monospace" font-size="4" font-weight="bold" fill="#ec4899" text-anchor="middle">G.SKILL</text>
</svg>
