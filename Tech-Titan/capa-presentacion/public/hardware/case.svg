<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background -->
  <rect width="80" height="80" fill="#0d1117" rx="8"/>
  <!-- Tower case silhouette -->
  <rect x="20" y="8" width="40" height="64" rx="3" fill="#0a1a1a" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- Mesh front panel (left portion) -->
  <rect x="20" y="8" width="20" height="64" rx="3" fill="#0d1f1f" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
  <!-- Mesh dots pattern -->
  <circle cx="24" cy="16" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="28" cy="16" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="32" cy="16" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="36" cy="16" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="24" cy="20" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="28" cy="20" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="32" cy="20" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="36" cy="20" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="24" cy="24" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="28" cy="24" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="32" cy="24" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="36" cy="24" r="0.8" fill="#06b6d4" opacity="0.5"/>
  <circle cx="24" cy="28" r="0.8" fill="#06b6d4" opacity="0.4"/>
  <circle cx="28" cy="28" r="0.8" fill="#06b6d4" opacity="0.4"/>
  <circle cx="32" cy="28" r="0.8" fill="#06b6d4" opacity="0.4"/>
  <circle cx="36" cy="28" r="0.8" fill="#06b6d4" opacity="0.4"/>
  <circle cx="24" cy="32" r="0.8" fill="#06b6d4" opacity="0.4"/>
  <circle cx="28" cy="32" r="0.8" fill="#06b6d4" opacity="0.4"/>
  <circle cx="32" cy="32" r="0.8" fill="#06b6d4" opacity="0.4"/>
  <circle cx="36" cy="32" r="0.8" fill="#06b6d4" opacity="0.4"/>
  <!-- Power button -->
  <circle cx="28" cy="42" r="4" fill="none" stroke="#06b6d4" stroke-width="1"/>
  <circle cx="28" cy="42" r="2" fill="#06b6d4" opacity="0.4"/>
  <!-- USB/IO ports -->
  <rect x="23" y="50" width="6" height="3" rx="0.5" fill="none" stroke="#06b6d4" stroke-width="0.8"/>
  <rect x="31" y="50" width="4" height="3" rx="0.5" fill="none" stroke="#06b6d4" stroke-width="0.8"/>
  <!-- Drive bays (right panel) -->
  <rect x="44" y="20" width="12" height="8" rx="1" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.6"/>
  <rect x="44" y="30" width="12" height="8" rx="1" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <!-- Bottom feet -->
  <rect x="22" y="70" width="6" height="3" rx="1" fill="#06b6d4" opacity="0.4"/>
  <rect x="52" y="70" width="6" height="3" rx="1" fill="#06b6d4" opacity="0.4"/>
  <!-- RGB strip accent -->
  <line x1="20" y1="12" x2="20" y2="68" stroke="#06b6d4" stroke-width="2" opacity="0.5"/>
</svg>
