<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Background -->
  <rect width="80" height="80" fill="#0d1117" rx="8"/>
  <!-- PSU body -->
  <rect x="10" y="18" width="60" height="44" rx="3" fill="#1a1400" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Fan grille (circle with cross pattern) -->
  <circle cx="28" cy="40" r="13" fill="none" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="28" cy="40" r="9" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.6"/>
  <circle cx="28" cy="40" r="5" fill="none" stroke="#f59e0b" stroke-width="0.8" opacity="0.6"/>
  <line x1="28" y1="27" x2="28" y2="53" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
  <line x1="15" y1="40" x2="41" y2="40" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
  <line x1="19" y1="31" x2="37" y2="49" stroke="#f59e0b" stroke-width="0.6" opacity="0.4"/>
  <line x1="37" y1="31" x2="19" y2="49" stroke="#f59e0b" stroke-width="0.6" opacity="0.4"/>
  <!-- Fan hub -->
  <circle cx="28" cy="40" r="2.5" fill="#f59e0b" opacity="0.6"/>
  <!-- Right panel - connectors/cables area -->
  <rect x="46" y="23" width="18" height="34" rx="1" fill="#1a1200" stroke="#f59e0b" stroke-width="0.8" opacity="0.7"/>
  <!-- Cable connectors -->
  <rect x="49" y="26" width="5" height="3" rx="0.5" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
  <rect x="56" y="26" width="5" height="3" rx="0.5" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
  <rect x="49" y="32" width="5" height="3" rx="0.5" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
  <rect x="56" y="32" width="5" height="3" rx="0.5" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
  <rect x="49" y="38" width="12" height="3" rx="0.5" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
  <rect x="49" y="44" width="12" height="3" rx="0.5" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
  <!-- Label -->
  <text x="28" y="68" font-family="monospace" font-size="4" fill="#f59e0b" text-anchor="middle" opacity="0.7">PSU</text>
  <!-- Power rating indicator -->
  <text x="55" y="52" font-family="monospace" font-size="3.5" fill="#f59e0b" text-anchor="middle" opacity="0.6">850W</text>
</svg>
